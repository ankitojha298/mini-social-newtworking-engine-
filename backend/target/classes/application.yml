spring:
  datasource:
    url: jdbc:h2:mem:connecthub_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driverClassName: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: averylongsecretkeythatisatleast256bitslongforhs256algorithmcomconnecthub
  expirationMs: 86400000

server:
  port: 8080
