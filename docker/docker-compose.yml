version: '3.8'

services:
  db:
    image: postgres:15
    container_name: connecthub-pg
    environment:
      POSTGRES_USER: connecthub
      POSTGRES_PASSWORD: password
      POSTGRES_DB: connecthub_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: connecthub-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
